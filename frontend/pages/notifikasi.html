<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduMate — Notifikasi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/responsive.css"/>
  <link rel="stylesheet" href="../css/sidebar.css"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0a0a0a;
      --primary: #f97316;
      --primary-hover: #ea6c0a;
      --primary-light: #fff4ed;
      --primary-mid: #fed7aa;
      --white: #ffffff;
      --gray-50: #f8f8f7;
      --gray-100: #f1f0ef;
      --gray-200: #e3e2e0;
      --gray-300: #cccac7;
      --gray-400: #9b9894;
      --gray-600: #6b6966;
      --green-light: #f0fdf4;
      --blue-light: #eff6ff;
      --yellow-light: #fffbeb;
      --red: #dc2626;
      --red-light: #fef2f2;
      --red-mid: #fecaca;
      --sidebar-width: 252px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    body { font-family: "DM Sans", sans-serif; background: var(--gray-50); min-height: 100vh; display: flex; color: var(--black); -webkit-font-smoothing: antialiased; }

    /* ===== SIDEBAR ===== */
.sidebar { width: var(--sidebar-width); background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
.sidebar-brand { display: flex; align-items: center; gap: 12px; padding: 20px 16px 20px; background: rgba(249, 115, 22, 0.08); border-bottom: 1.5px solid rgba(249, 115, 22, 0.15); flex-shrink: 0; width: 100%; }
.brand-name { font-family: "DM Serif Display", serif; font-size: 19px; color: var(--black); letter-spacing: -0.4px; }
.nav-section { padding: 8px 10px; flex: 1; overflow-y: auto; scrollbar-width: none; }
.nav-section::-webkit-scrollbar { display: none; }
.nav-label { font-size: 9.5px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1.1px; padding: 0 12px; margin: 4px 0 2px; display: block; }
.nav-item { display: flex; align-items: center; gap: 11px; padding: 12px; border-radius: 9px; cursor: pointer; transition: all 0.12s; text-decoration: none; color: var(--gray-400); font-size: 14px; font-weight: 400; position: relative; margin-bottom: 1px; }
.nav-item:hover { background: var(--gray-100); color: var(--black); }
.nav-item.active { background: var(--gray-100); color: var(--black); font-weight: 500; }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 7px; bottom: 7px; width: 3px; background: var(--primary); border-radius: 0 3px 3px 0; }
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0.45; transition: opacity 0.12s; }
.nav-item:hover .nav-icon, .nav-item.active .nav-icon { opacity: 1; }
.nav-icon svg { width: 17px; height: 17px; stroke-width: 1.75; }
.nav-badge { margin-left: auto; background: var(--primary); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; min-width: 18px; text-align: center; display: none; }
.nav-divider { height: 1px; background: var(--gray-100); margin: 2px 12px; }
.sidebar-footer { flex-shrink: 0; border-top: 1px solid var(--gray-100); padding: 14px 10px; }
.sidebar-user { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 9px; cursor: pointer; transition: background 0.12s; text-decoration: none; }
.sidebar-user:hover { background: var(--gray-100); }
.user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary-light); border: 1.5px solid var(--primary-mid); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; overflow: hidden; }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13.5px; font-weight: 600; color: var(--black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-email { font-size: 11.5px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* ===== MAIN CONTENT ===== */
    .main { margin-left: var(--sidebar-width); flex: 1; padding: 40px 48px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); max-height: 120px; padding-top: 15px; padding-bottom: 15px; }
      to   { opacity: 0; transform: translateX(48px); max-height: 0; padding-top: 0; padding-bottom: 0; border: none; }
    }

    .anim-1 { opacity: 0; animation: fadeUp 0.5s ease 0.05s forwards; }
    .anim-2 { opacity: 0; animation: fadeUp 0.5s ease 0.12s forwards; }
    .anim-3 { opacity: 0; animation: fadeUp 0.5s ease 0.2s forwards; }

    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
    .page-header h1 { font-family: "DM Serif Display", serif; font-size: 36px; color: var(--black); letter-spacing: -1px; margin-bottom: 6px; line-height: 1.1; }
    .page-header p { color: var(--gray-400); font-size: 14px; }

    .header-actions { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }

    .btn-header { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--white); color: var(--black); border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-family: "DM Sans", sans-serif; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-header:hover { background: var(--gray-100); border-color: var(--gray-300); }
    .btn-header.danger { color: var(--red); border-color: var(--red-mid); background: var(--red-light); }
    .btn-header.danger:hover { background: #fee2e2; border-color: var(--red); }

    .tabs-wrap { display: flex; align-items: center; gap: 4px; background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: 4px; width: fit-content; margin-bottom: 20px; }
    .tab { display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--gray-400); border: none; background: transparent; font-family: "DM Sans", sans-serif; white-space: nowrap; }
    .tab:hover { color: var(--black); background: var(--gray-50); }
    .tab.active { background: var(--black); color: white; }
    .tab.active .tab-count { background: var(--primary); color: white; }
    .tab-count { background: var(--primary); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 99px; min-width: 18px; text-align: center; display: none; }

    .notif-container { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; }

    .notif-group-label { padding: 9px 20px; background: var(--gray-50); border-bottom: 1px solid var(--gray-100); font-size: 10.5px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 8px; }
    .notif-group-label::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }

    .notif-item { display: flex; align-items: flex-start; gap: 14px; padding: 15px 20px; border-bottom: 1px solid var(--gray-100); transition: background 0.12s; position: relative; overflow: hidden; }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: var(--gray-50); }
    .notif-item:hover .btn-dismiss { opacity: 1; }
    .notif-item.unread { background: #fffbf7; }
    .notif-item.unread:hover { background: var(--primary-light); }
    .notif-item.unread::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--primary); border-radius: 0 2px 2px 0; }
    .notif-item.dismissing { animation: slideOut 0.3s ease forwards; pointer-events: none; }

    .notif-icon-wrap { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .notif-icon-wrap.orange { background: var(--primary-light); }
    .notif-icon-wrap.green  { background: var(--green-light); }
    .notif-icon-wrap.blue   { background: var(--blue-light); }
    .notif-icon-wrap.yellow { background: var(--yellow-light); }
    .notif-icon-wrap.gray   { background: var(--gray-100); }

    .notif-content { flex: 1; min-width: 0; cursor: pointer; }
    .notif-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 3px; }
    .notif-title { font-size: 13.5px; font-weight: 600; color: var(--black); line-height: 1.4; }
    .notif-time { font-size: 11px; color: var(--gray-400); white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .notif-desc { font-size: 13px; color: var(--gray-600); line-height: 1.55; }

    .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); flex-shrink: 0; margin-top: 6px; }

    /* Tombol dismiss — muncul saat hover */
    .btn-dismiss {
      width: 28px; height: 28px;
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; color: var(--gray-400);
      transition: all 0.15s; flex-shrink: 0;
      opacity: 0; align-self: flex-start; margin-top: 2px;
      font-family: "DM Sans", sans-serif; line-height: 1;
    }
    .btn-dismiss:hover { background: var(--red-light); color: var(--red); border-color: var(--red-mid); }

    .unread-summary { display: flex; align-items: center; gap: 10px; padding: 11px 20px; background: var(--primary-light); border-bottom: 1px solid var(--primary-mid); }
    .unread-summary-text { font-size: 13px; color: var(--primary); font-weight: 500; }
    .unread-summary-count { font-weight: 700; }

    .empty-state { text-align: center; padding: 64px 20px; color: var(--gray-400); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { font-size: 14px; line-height: 1.7; }
  </style>
</head>

        <h1>Notifikasi</h1>
        <p>Pantau semua aktivitas dan permintaan belajarmu di sini.</p>
      </div>
      <div class="header-actions">
        <button class="btn-header" onclick="bacaSemua()">✓ Tandai Semua Dibaca</button>
        <button class="btn-header danger" onclick="hapusYangSudahDibaca()">🗑 Hapus yang Dibaca</button>
      </div>
    </div>

    <div class="tabs-wrap anim-2">
      <button class="tab active" onclick="switchTab(this, 'semua')">Semua <span class="tab-count" id="countSemua">0</span></button>
      <button class="tab" onclick="switchTab(this, 'ajakan')">Ajakan <span class="tab-count" id="countAjakan">0</span></button>
      <button class="tab" onclick="switchTab(this, 'sesi')">Sesi</button>
      <button class="tab" onclick="switchTab(this, 'rating')">Rating</button>
    </div>

    <div class="notif-container anim-3" id="notifList">
      <div class="empty-state"><div class="empty-icon">⏳</div><p>Memuat notifikasi...</p></div>
    </div>
  </main><script src="../js/auth-client.js"></script>
  <script>
    const API = window.location.hostname === 'localhost'
      ? 'http://localhost:3000/api'
: window.location.origin + '/api'

    let allNotif = [];
    let currentFilter = 'semua';

    const TIPE_ICON = {
      ajakan: { icon: '🤝', cls: 'orange' },
      sesi:   { icon: '📖', cls: 'blue'   },
      rating: { icon: '⭐', cls: 'yellow' },
      sistem: { icon: '🔔', cls: 'gray'   },
    };

    function formatWaktu(dateStr) {
      if (!dateStr) return '-';
      const d    = new Date(dateStr);
      const diff = Math.floor((Date.now() - d) / 60000);
      if (diff < 1)   return 'Baru saja';
      if (diff < 60)  return `${diff} mnt lalu`;
      const jam = Math.floor(diff / 60);
      if (jam < 24)   return `${jam} jam lalu`;
      const hari = Math.floor(jam / 24);
      if (hari === 1) return 'Kemarin';
      return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderNotif(filter) {
      currentFilter = filter;
      const container = document.getElementById('notifList');
      const filtered  = filter === 'semua' ? allNotif : allNotif.filter(n => n.tipe === filter);

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔔</div><p>Tidak ada notifikasi di kategori ini.</p></div>';
        return;
      }

      const unreadCount = filtered.filter(n => !n.is_read).length;
      let html = '';

      if (unreadCount > 0) {
        html += `<div class="unread-summary"><span>🔔</span><span class="unread-summary-text"><span class="unread-summary-count">${unreadCount} notifikasi</span> belum dibaca</span></div>`;
      }

      const now       = new Date();
      const today     = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      const weekAgo   = new Date(today); weekAgo.setDate(today.getDate() - 7);

      const groups = { 'Hari Ini': [], 'Kemarin': [], 'Minggu Ini': [], 'Lebih Lama': [] };
      filtered.forEach(n => {
        const d   = new Date(n.created_at);
        const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        if (day >= today)          groups['Hari Ini'].push(n);
        else if (day >= yesterday) groups['Kemarin'].push(n);
        else if (day >= weekAgo)   groups['Minggu Ini'].push(n);
        else                       groups['Lebih Lama'].push(n);
      });

      Object.entries(groups).forEach(([label, items]) => {
        if (!items.length) return;
        html += `<div class="notif-group-label">${label}</div>`;
        items.forEach(n => {
          const info      = TIPE_ICON[n.tipe] || TIPE_ICON.sistem;
          const unreadCls = n.is_read ? '' : 'unread';
          const unreadDot = n.is_read ? '' : '<div class="unread-dot"></div>';
          html += `
            <div class="notif-item ${unreadCls}" data-id="${n.id}">
              <div class="notif-icon-wrap ${info.cls}">${info.icon}</div>
              <div class="notif-content" onclick="bacaNotif(${n.id}, this.closest('.notif-item'))">
                <div class="notif-top">
                  <div class="notif-title">${n.judul || 'Notifikasi'}</div>
                  <div class="notif-time">${formatWaktu(n.created_at)}</div>
                </div>
                <div class="notif-desc">${n.pesan}</div>
              </div>
              ${unreadDot}
              <button class="btn-dismiss" onclick="dismissNotif(${n.id}, this)" title="Hapus notifikasi">×</button>
            </div>`;
        });
      });

      container.innerHTML = html;
    }

    function updateBadges() {
      const unread       = allNotif.filter(n => !n.is_read).length;
      const unreadAjakan = allNotif.filter(n => !n.is_read && n.tipe === 'ajakan').length;
      const navBadge     = document.getElementById('navBadge');
      const countSemua   = document.getElementById('countSemua');
      const countAjakan  = document.getElementById('countAjakan');
      if (navBadge)    { navBadge.textContent    = unread;       navBadge.style.display    = unread > 0       ? 'inline-block' : 'none'; }
      if (countSemua)  { countSemua.textContent  = unread;       countSemua.style.display  = unread > 0       ? 'inline-block' : 'none'; }
      if (countAjakan) { countAjakan.textContent = unreadAjakan; countAjakan.style.display = unreadAjakan > 0 ? 'inline-block' : 'none'; }
    }

    function switchTab(el, filter) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderNotif(filter);
    }

    async function bacaNotif(id, el) {
      if (!el || !el.classList.contains('unread')) return;
      try {
        await fetch(`${API}/notifikasi/${id}/baca`, {
          method: 'PUT', headers: { 'Authorization': `Bearer ${getToken()}` },
        });
        const notif = allNotif.find(n => n.id === id);
        if (notif) notif.is_read = 1;
        updateBadges();
        renderNotif(currentFilter);
      } catch(err) {}
    }

    async function dismissNotif(id, btn) {
      const item = btn.closest('.notif-item');
      item.classList.add('dismissing');
      try {
        const res  = await fetch(`${API}/notifikasi/${id}`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${getToken()}` },
        });
        const data = await res.json();
        if (data.success) {
          allNotif = allNotif.filter(n => n.id !== id);
          updateBadges();
          setTimeout(() => renderNotif(currentFilter), 320);
        } else {
          item.classList.remove('dismissing');
          showToast('Gagal menghapus notifikasi.', 'error');
        }
      } catch(err) {
        item.classList.remove('dismissing');
        showToast('Terjadi kesalahan.', 'error');
      }
    }

    async function bacaSemua() {
      try {
        const res  = await fetch(`${API}/notifikasi/baca-semua`, {
          method: 'PUT', headers: { 'Authorization': `Bearer ${getToken()}` },
        });
        const data = await res.json();
        if (data.success) {
          allNotif.forEach(n => n.is_read = 1);
          renderNotif(currentFilter);
          updateBadges();
          showToast('Semua notifikasi ditandai dibaca!', 'success');
        }
      } catch(err) { showToast('Gagal menandai notifikasi.', 'error'); }
    }

    async function hapusYangSudahDibaca() {
      const sudahDibaca = allNotif.filter(n => n.is_read).length;
      if (sudahDibaca === 0) { showToast('Tidak ada notifikasi yang sudah dibaca.', 'info'); return; }
      try {
        const res  = await fetch(`${API}/notifikasi/hapus-semua`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${getToken()}` },
        });
        const data = await res.json();
        if (data.success) {
          allNotif = allNotif.filter(n => !n.is_read);
          renderNotif(currentFilter);
          updateBadges();
          showToast(`${sudahDibaca} notifikasi berhasil dihapus.`, 'success');
        }
      } catch(err) { showToast('Gagal menghapus notifikasi.', 'error'); }
    }

    async function loadNotifikasi() {
      try {
        const res  = await fetch(`${API}/notifikasi`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
        const data = await res.json();
        if (data.success) { allNotif = data.notifikasi; updateBadges(); renderNotif(currentFilter); }
      } catch(err) { showToast('Gagal memuat notifikasi.', 'error'); }
    }

    initPage().then(() => loadNotifikasi());
  </script>
</body>
</html>
