<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduMate</title>
    <script>
      if (localStorage.getItem("sb_theme") === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/darkmode.css" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --black: #0a0a0a;
        --primary: #f97316;
        --primary-hover: #ea6c0a;
        --primary-light: #fff4ed;
        --white: #ffffff;
        --gray-50: #fafafa;
        --gray-100: #f4f4f4;
        --gray-200: #e8e8e8;
        --gray-400: #a0a0a0;
        --gray-600: #555;
        --green: #16a34a;
        --green-light: #f0fdf4;
        --blue: #2563eb;
        --blue-light: #eff6ff;
        --yellow: #d97706;
        --yellow-light: #fffbeb;
        --sidebar-width: 240px;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--gray-50);
        min-height: 100vh;
        display: flex;
        color: var(--black);
      }

      /* ===== SIDEBAR ===== */
      .sidebar {
        width: var(--sidebar-width);
        background: var(--white);
        border-right: 1px solid var(--gray-200);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 100;
        padding: 24px 0;
      }
      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 20px 24px;
        border-bottom: 1px solid var(--gray-100);
        margin-bottom: 16px;
      }
      .brand-icon {
        width: 34px;
        height: 34px;
        background: var(--primary);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }
      .brand-name {
        font-family: "DM Serif Display", serif;
        font-size: 17px;
        color: var(--black);
        letter-spacing: -0.3px;
      }
      .nav-section {
        padding: 0 12px;
        flex: 1;
      }
      .nav-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--gray-400);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 0 8px;
        margin-bottom: 6px;
        margin-top: 16px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 9px;
        cursor: pointer;
        transition: all 0.15s;
        text-decoration: none;
        color: var(--gray-600);
        font-size: 13.5px;
        margin-bottom: 2px;
      }
      .nav-item:hover {
        background: var(--primary-light);
        color: var(--primary);
      }
      .nav-item.active {
        background: var(--primary);
        color: var(--white);
      }
      .nav-icon {
        font-size: 16px;
        width: 20px;
        text-align: center;
        flex-shrink: 0;
      }
      .nav-badge {
        margin-left: auto;
        background: var(--primary);
        color: white;
        font-size: 10px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 20px;
        min-width: 18px;
        text-align: center;
        display: none;
      }
      .nav-item.active .nav-badge {
        background: white;
        color: var(--primary);
      }
      .sidebar-user {
        padding: 16px 20px;
        border-top: 1px solid var(--gray-100);
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .sidebar-user:hover {
        background: var(--gray-50);
      }
      .user-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--primary-light);
        border: 2px solid var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        overflow: hidden;
      }
      .user-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      .user-info {
        flex: 1;
        min-width: 0;
      }
      .user-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--black);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-email {
        font-size: 11px;
        color: var(--gray-400);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ===== MAIN ===== */
      .main {
        margin-left: var(--sidebar-width);
        flex: 1;
        padding: 32px;
        max-width: calc(var(--sidebar-width) + 740px);
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== PAGE HEADER ===== */
      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 0.4s ease 0.05s forwards;
      }
      .page-header h1 {
        font-family: "DM Serif Display", serif;
        font-size: 26px;
        letter-spacing: -0.5px;
        margin-bottom: 4px;
        color: var(--black);
      }
      .page-header p {
        color: var(--gray-400);
        font-size: 14px;
      }

      .btn-baca-semua {
        padding: 9px 18px;
        background: var(--white);
        color: var(--primary);
        border: 1.5px solid var(--primary);
        border-radius: 9px;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        margin-top: 4px;
      }
      .btn-baca-semua:hover {
        background: var(--primary-light);
      }

      /* ===== TABS ===== */
      .tabs {
        display: flex;
        gap: 4px;
        background: var(--gray-100);
        border-radius: 10px;
        padding: 4px;
        width: fit-content;
        margin-bottom: 20px;
        opacity: 0;
        animation: fadeUp 0.4s ease 0.1s forwards;
      }
      .tab {
        padding: 8px 18px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        color: var(--gray-600);
        border: none;
        background: transparent;
        font-family: "DM Sans", sans-serif;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .tab.active {
        background: var(--white);
        color: var(--black);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      .tab-count {
        background: var(--primary);
        color: white;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 20px;
      }

      /* ===== NOTIF LIST ===== */
      .notif-list {
        display: flex;
        flex-direction: column;
        background: var(--white);
        border: 1px solid var(--gray-200);
        border-radius: 14px;
        overflow: hidden;
        opacity: 0;
        animation: fadeUp 0.4s ease 0.15s forwards;
      }

      .notif-group-label {
        padding: 10px 20px;
        background: var(--gray-50);
        border-bottom: 1px solid var(--gray-100);
        font-size: 11px;
        font-weight: 600;
        color: var(--gray-400);
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .notif-item {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--gray-100);
        transition: background 0.15s;
        cursor: pointer;
        position: relative;
      }
      .notif-item:last-child {
        border-bottom: none;
      }
      .notif-item:hover {
        background: var(--gray-50);
      }
      .notif-item.unread {
        background: var(--primary-light);
      }
      .notif-item.unread:hover {
        background: #ffe8d6;
      }

      .unread-dot {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--primary);
      }

      .notif-icon-wrap {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .notif-icon-wrap.orange {
        background: var(--primary-light);
      }
      .notif-icon-wrap.green {
        background: var(--green-light);
      }
      .notif-icon-wrap.blue {
        background: var(--blue-light);
      }
      .notif-icon-wrap.yellow {
        background: var(--yellow-light);
      }
      .notif-icon-wrap.gray {
        background: var(--gray-100);
      }

      .notif-content {
        flex: 1;
        min-width: 0;
      }
      .notif-title {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--black);
        margin-bottom: 3px;
        line-height: 1.4;
      }
      .notif-desc {
        font-size: 12.5px;
        color: var(--gray-600);
        line-height: 1.5;
        margin-bottom: 6px;
      }
      .notif-time {
        font-size: 11px;
        color: var(--gray-400);
      }

      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--gray-400);
      }
      .empty-state .emoji {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .empty-state p {
        font-size: 14px;
      }

      /* ===== DARK MODE NOTIFIKASI ===== */
      html.dark .btn-baca-semua {
        background: transparent;
        color: var(--primary);
        border-color: var(--primary);
      }
      html.dark .btn-baca-semua:hover {
        background: #2a1500;
      }
      html.dark .notif-list {
        background: #1a1a1a;
        border-color: #2a2a2a;
      }
      html.dark .notif-group-label {
        background: #151515;
        border-bottom-color: #2a2a2a;
        color: #666;
      }
      html.dark .notif-item {
        border-bottom-color: #2a2a2a;
      }
      html.dark .notif-item:hover {
        background: #1f1f1f;
      }
      html.dark .notif-item.unread {
        background: #2a1500;
      }
      html.dark .notif-item.unread:hover {
        background: #331a00;
      }
      html.dark .notif-title {
        color: #f0f0f0;
      }
      html.dark .notif-desc {
        color: #aaa;
      }
      html.dark .notif-time {
        color: #666;
      }
      html.dark .notif-icon-wrap.orange {
        background: #2a1500;
      }
      html.dark .notif-icon-wrap.green {
        background: #0a1f0f;
      }
      html.dark .notif-icon-wrap.blue {
        background: #0a1428;
      }
      html.dark .notif-icon-wrap.yellow {
        background: #1f1400;
      }
      html.dark .notif-icon-wrap.gray {
        background: #2a2a2a;
      }
      html.dark .tabs {
        background: #1a1a1a;
      }
      html.dark .tab {
        color: #888;
      }
      html.dark .tab.active {
        background: #2a2a2a;
        color: #f0f0f0;
      }
      html.dark .page-header h1 {
        color: #f0f0f0;
      }
      html.dark .page-header p {
        color: #888;
      }
      html.dark .empty-state {
        color: #666;
      }
    </style>
  </head>
  <body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg
          width="34"
          height="34"
          viewBox="0 0 100 100"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect width="100" height="100" rx="22" fill="#f97316" />
          <polygon points="0,58 100,42 100,100 0,100" fill="#0a0a0a" />
          <path d="M28 24 L72 24 L72 37 L40 37 L40 49 L28 49 Z" fill="white" />
          <rect x="40" y="45" width="28" height="11" fill="white" />
          <path
            d="M28 60 L40 60 L40 68 L72 68 L72 80 L28 80 Z"
            fill="#f97316"
          />
        </svg>
        <span class="brand-name">EduMate</span>
      </div>
      <nav class="nav-section">
        <div class="nav-label">Menu</div>
        <a href="dashboard.html" class="nav-item"
          ><span class="nav-icon">🏠</span> Dashboard</a
        >
        <a href="cari-teman.html" class="nav-item"
          ><span class="nav-icon">🔍</span> Cari Teman Belajar</a
        >
        <a href="jadwal.html" class="nav-item"
          ><span class="nav-icon">📅</span> Jadwal Saya</a
        >
        <a href="sesi.html" class="nav-item"
          ><span class="nav-icon">📖</span> Sesi Belajar</a
        >
        <div class="nav-label">Lainnya</div>
        <a href="notifikasi.html" class="nav-item active"
          ><span class="nav-icon">🔔</span> Notifikasi<span
            class="nav-badge"
            id="navBadge"
            style="display: none"

          ></a
        >
        <a href="rating.html" class="nav-item"
          ><span class="nav-icon">⭐</span> Rating & Review</a
        >

      </nav>
      <div class="sidebar-user">
        <div class="user-avatar">👤</div>
        <div class="user-info">
          <div class="user-name">Nama User</div>
          <div class="user-email">
            <a
              href="/cdn-cgi/l/email-protection"
              class="__cf_email__"
              data-cfemail="157078747c79557278747c793b767a78"
              >[email&#160;protected]</a
            >
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="page-header">
        <div>
          <h1>Notifikasi</h1>
          <p>Pantau semua aktivitas dan permintaan belajarmu di sini.</p>
        </div>
        <button class="btn-baca-semua" onclick="bacaSemua()">
          ✓ Tandai Semua Dibaca
        </button>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this, 'semua')">
          Semua
          <span class="tab-count" id="countSemua" style="display: none">0</span>
        </button>
        <button class="tab" onclick="switchTab(this, 'ajakan')">
          Ajakan Belajar
          <span class="tab-count" id="countAjakan" style="display: none"
            >0</span
          >
        </button>
        <button class="tab" onclick="switchTab(this, 'sesi')">Sesi</button>
        <button class="tab" onclick="switchTab(this, 'rating')">Rating</button>
      </div>

      <!-- Notif List -->
      <div class="notif-list" id="notifList">
        <div style="text-align: center; color: var(--gray-400); padding: 40px">
          Memuat notifikasi...
        </div>
      </div>
    </main>

    <script
      data-cfasync="false"
      src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"
    ></script>
    <script src="../js/auth-client.js"></script>
    <script>
      const API =
        window.location.hostname === "localhost"
          ? "http://localhost:3000/api"
          : "https://edumate-production-c2df.up.railway.app/api";
      let allNotif = [];
      let currentFilter = "semua";

      const TIPE_ICON = {
        ajakan: { icon: "🤝", cls: "orange" },
        sesi: { icon: "📖", cls: "blue" },
        rating: { icon: "⭐", cls: "yellow" },
        sistem: { icon: "🔔", cls: "gray" },
      };

      function formatWaktu(dateStr) {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        const now = new Date();
        const diffMnt = Math.floor((now - d) / 60000);
        const diffJam = Math.floor(diffMnt / 60);
        const diffHari = Math.floor(diffJam / 24);
        if (diffMnt < 1) return "Baru saja";
        if (diffMnt < 60) return `${diffMnt} menit yang lalu`;
        if (diffJam < 24) return `${diffJam} jam yang lalu`;
        if (diffHari === 1) return "Kemarin";
        return d.toLocaleDateString("id-ID", {
          day: "numeric",
          month: "short",
          year: "numeric",
        });
      }

      function renderNotif(filter) {
        currentFilter = filter;
        const list = document.getElementById("notifList");
        const filtered =
          filter === "semua"
            ? allNotif
            : allNotif.filter((n) => n.tipe === filter);

        if (filtered.length === 0) {
          list.innerHTML =
            '<div class="empty-state"><div class="emoji">🔔</div><p>Tidak ada notifikasi di kategori ini.</p></div>';
          return;
        }

        const now = new Date();
        const today = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
        );
        const yesterday = new Date(today);
        yesterday.setDate(today.getDate() - 1);
        const weekAgo = new Date(today);
        weekAgo.setDate(today.getDate() - 7);

        const groups = {
          "Hari Ini": [],
          Kemarin: [],
          "Minggu Ini": [],
          "Lebih Lama": [],
        };
        filtered.forEach((n) => {
          const d = new Date(n.created_at);
          const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
          if (day >= today) groups["Hari Ini"].push(n);
          else if (day >= yesterday) groups["Kemarin"].push(n);
          else if (day >= weekAgo) groups["Minggu Ini"].push(n);
          else groups["Lebih Lama"].push(n);
        });

        let html = "";
        Object.entries(groups).forEach(([label, items]) => {
          if (items.length === 0) return;
          html += `<div class="notif-group-label">${label}</div>`;
          items.forEach((n) => {
            const info = TIPE_ICON[n.tipe] || TIPE_ICON.sistem;
            const unreadClass = n.is_read ? "" : "unread";
            const dot = n.is_read ? "" : '<div class="unread-dot"></div>';
            html += `
            <div class="notif-item ${unreadClass}" data-id="${n.id}" onclick="bacaNotif(${n.id}, this)">
              ${dot}
              <div class="notif-icon-wrap ${info.cls}">${info.icon}</div>
              <div class="notif-content">
                <div class="notif-title">${n.judul || "Notifikasi"}</div>
                <div class="notif-desc">${n.pesan}</div>
                <div class="notif-time">${formatWaktu(n.created_at)}</div>
              </div>
            </div>`;
          });
        });

        list.innerHTML = html;
      }

      function updateBadges() {
        const unread = allNotif.filter((n) => !n.is_read).length;
        const unreadAjakan = allNotif.filter(
          (n) => !n.is_read && n.tipe === "ajakan",
        ).length;

        const navBadge = document.getElementById("navBadge");
        const countSemua = document.getElementById("countSemua");
        const countAjakan = document.getElementById("countAjakan");

        if (navBadge) {
          navBadge.textContent = unread;
          navBadge.style.display = unread > 0 ? "inline-block" : "none";
        }
        if (countSemua) {
          countSemua.textContent = unread;
          countSemua.style.display = unread > 0 ? "inline-block" : "none";
        }
        if (countAjakan) {
          countAjakan.textContent = unreadAjakan;
          countAjakan.style.display =
            unreadAjakan > 0 ? "inline-block" : "none";
        }
      }

      function switchTab(el, filter) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        renderNotif(filter);
      }

      async function bacaNotif(id, el) {
        if (!el.classList.contains("unread")) return;
        const token = getToken();
        try {
          await fetch(`${API}/notifikasi/${id}/baca`, {
            method: "PUT",
            headers: { Authorization: `Bearer ${token}` },
          });
          el.classList.remove("unread");
          const dot = el.querySelector(".unread-dot");
          if (dot) dot.remove();
          const notif = allNotif.find((n) => n.id === id);
          if (notif) notif.is_read = 1;
          updateBadges();
        } catch (err) {
          console.error("Gagal tandai baca:", err);
        }
      }

      async function bacaSemua() {
        const token = getToken();
        try {
          const res = await fetch(`${API}/notifikasi/baca-semua`, {
            method: "PUT",
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          if (data.success) {
            allNotif.forEach((n) => (n.is_read = 1));
            renderNotif(currentFilter);
            updateBadges();
            showToast("Semua notifikasi ditandai dibaca!", "success");
          }
        } catch (err) {
          showToast("Gagal menandai notifikasi.", "error");
        }
      }

      async function loadNotifikasi() {
        const token = getToken();
        try {
          const res = await fetch(`${API}/notifikasi`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          if (data.success) {
            allNotif = data.notifikasi;
            updateBadges();
            renderNotif(currentFilter);
          }
        } catch (err) {
          showToast("Gagal memuat notifikasi.", "error");
        }
      }

      initPage().then(() => loadNotifikasi());
    </script>
  </body>
</html>
